<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>
  <head>
    <title>Project 3 - Documentation</title>
    <meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />

    <style type="text/css">
      .header,
      .header .name,
      .header .meta,
      .header a,
      .header a:visited,
      .header a:hover {
        color: #ffffff;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #ffffff;
        color: #222222;
      }

      html, body {
        height: 100%;
      }

      .header {
        background: #500000;
        color: #ffffff;
        padding: 18px 10px;
      }

      .header-inner {
        width: 92%;
        max-width: 980px;
        margin: 0 auto;
      }

      .brand-row {
        width: 100%;
        border-collapse: collapse;
      }

      .brand-left {
        vertical-align: middle;
        width: 1%;
        white-space: nowrap;
      }

      .brand-left img {
        height: 54px;
        width: auto;
        display: block;
        border: 0;
      }

      .brand-right {
        color: white;
        vertical-align: middle;
        padding-left: 14px;
      }

      .header .name {
        font-size: 26px;
        font-weight: bold;
        margin: 0;
        padding: 0;
        letter-spacing: 1px;
      }

      .header .meta {
        font-size: 14px;
        margin-top: 6px;
        line-height: 18px;
      }

      /* Navigation Bar */
      .navbar {
        background: #3c0000;
        padding: 0;
        border-bottom: 2px solid #700000;
      }

      .navbar-inner {
        width: 92%;
        max-width: 980px;
        margin: 0 auto;
      }

      .navbar a {
        display: inline-block;
        color: #ffffff;
        text-decoration: none;
        padding: 12px 20px;
        font-size: 14px;
        font-weight: bold;
        letter-spacing: 0.5px;
      }

      .navbar a:hover {
        background: #700000;
      }

      .navbar a.active {
        background: #700000;
        border-bottom: 3px solid #ffffff;
      }

      .docs-frame {
        width: 100%;
        height: calc(100vh - 140px);
        border: none;
      }

      a {
        color: #500000;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <div class="header-inner">
        <table class="brand-row" border="0" cellspacing="0" cellpadding="0">
          <tr>
            <td class="brand-left">
              <img src="Logo.png" alt="Brand Logo" />
            </td>
            <td class="brand-right">
              <div class="name">Quang Huy Le</div>
              <div class="meta">
                CSCE 412 - Cloud Computing<br />
                Project 3: Load Balancer
              </div>
            </td>
          </tr>
        </table>
      </div>
    </div>

    <div class="navbar">
      <div class="navbar-inner">
        <a href="index.html">Home</a>
        <a href="documentation.html" class="active">Documentation</a>
      </div>
    </div>

    <iframe class="docs-frame" src="html/index.html"></iframe>
  </body>
</html>
